<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Phishing Detector</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/custom.css') }}">
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="glass-card p-5 animate-fade-in">
                    <h2 class="fw-bold mb-4 text-center">Join <span class="text-primary">Us</span></h2>
                    
                    <form action="" method="post">
                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold">USERNAME</label>
                            <input type="text" name="username" class="form-control rounded-4 p-3 bg-light border-0" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold">EMAIL</label>
                            <input type="email" name="email" class="form-control rounded-4 p-3 bg-light border-0" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold">PASSWORD</label>
                            <input type="password" name="password" class="form-control rounded-4 p-3 bg-light border-0" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-muted small fw-bold">CONFIRM PASSWORD</label>
                            <input type="password" name="confirm_password" class="form-control rounded-4 p-3 bg-light border-0" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold">WHAT IS YOUR MOTHER'S MAIDEN NAME? (RECOVERY ANSWER)</label>
                            <input type="text" name="secret_answer" class="form-control rounded-4 p-3 bg-light border-0" placeholder="Used for password reset" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 p-3 rounded-4 fw-bold">Create Account</button>
                    </form>
                    
                    <div class="mt-4 p-3 bg-primary bg-opacity-10 rounded-4">
                        <p class="small text-muted mb-0">
                            <strong>Note:</strong> After registration, you must be manually verified by the administrator in the Google Cloud Console before you can connect your Gmail.
                        </p>
                    </div>

                    <p class="text-center mt-4 text-muted small mb-0">
                        Already have an account? <a href="{{ url_for('login') }}" class="text-primary fw-bold">Login</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
