<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Phishing Detector</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/custom.css') }}">
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="glass-card p-5 animate-fade-in">
                    <h2 class="fw-bold mb-4 text-center">Reset <span class="text-primary">Password</span></h2>
                    
                    {% with messages = get_flashed_messages() %}
                    {% if messages %}
                        {% for message in messages %}
                        <div class="alert alert-warning border-0 rounded-4 small mb-4">{{ message }}</div>
                        {% endfor %}
                    {% endif %}
                    {% endwith %}

                    <form action="" method="post">
                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold">USERNAME</label>
                            <input type="text" name="username" class="form-control rounded-4 p-3 bg-light border-0" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold">SECURITY ANSWER (MOTHER'S MAIDEN NAME)</label>
                            <input type="text" name="secret_answer" class="form-control rounded-4 p-3 bg-light border-0" required>
                        </div>
                        <hr class="my-4 opacity-10">
                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold">NEW PASSWORD</label>
                            <input type="password" name="new_password" class="form-control rounded-4 p-3 bg-light border-0" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-muted small fw-bold">CONFIRM NEW PASSWORD</label>
                            <input type="password" name="confirm_new_password" class="form-control rounded-4 p-3 bg-light border-0" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 p-3 rounded-4 fw-bold">Reset Password</button>
                    </form>
                    
                    <p class="text-center mt-4 text-muted small mb-0">
                        Remembered? <a href="{{ url_for('login') }}" class="text-primary fw-bold">Sign In</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
