<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - Phishing Detector</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/custom.css') }}">
</head>
<body>
    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-5 animate-fade-in">
            <div>
                <h1 class="fw-bold mb-0">Manual <span class="text-primary">Analysis</span></h1>
                <p class="text-muted">Analyze suspicious content directly</p>
            </div>
            <a href="{{ url_for('index') }}" class="btn btn-secondary d-flex align-items-center gap-2">
                <i data-lucide="arrow-left"></i> Back to Inbox
            </a>
        </div>
        
        <div class="glass-card p-4 animate-fade-in" style="animation-delay: 0.1s;">
            <form method="POST">
                <div class="mb-4">
                    <label for="content" class="form-label fw-bold text-muted mb-2 text-uppercase small">Paste Email Content</label>
                    <textarea 
                        class="form-control p-3" 
                        id="content" 
                        name="content" 
                        rows="12" 
                        placeholder="Paste the full email text, including headers if available, for a thorough AI analysis..."
                        style="border-radius: 0.75rem;"></textarea>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary btn-lg d-flex align-items-center justify-content-center gap-2">
                        <i data-lucide="zap"></i> Perform Deep Analysis
                    </button>
                </div>
            </form>
        </div>

        <div class="mt-5 animate-fade-in" style="animation-delay: 0.2s;">
            <div class="row g-4">
                <div class="col-md-4">
                    <div class="glass-card p-3 d-flex align-items-center gap-3">
                        <div class="bg-primary bg-opacity-10 p-2 rounded-3">
                            <i data-lucide="shield" class="text-primary"></i>
                        </div>
                        <div>
                            <h6 class="mb-0 fw-bold">Secure</h6>
                            <small class="text-muted small">AI-driven detection</small>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="glass-card p-3 d-flex align-items-center gap-3">
                        <div class="bg-primary bg-opacity-10 p-2 rounded-3">
                            <i data-lucide="clock" class="text-primary"></i>
                        </div>
                        <div>
                            <h6 class="mb-0 fw-bold">Fast</h6>
                            <small class="text-muted small">Real-time processing</small>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="glass-card p-3 d-flex align-items-center gap-3">
                        <div class="bg-primary bg-opacity-10 p-2 rounded-3">
                            <i data-lucide="cpu" class="text-primary"></i>
                        </div>
                        <div>
                            <h6 class="mb-0 fw-bold">Deep</h6>
                            <small class="text-muted small">Pattern recognition</small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Global Loader Overlay -->
    <div id="globalLoader" class="loader-overlay">
        <div class="loader-content">
            <div class="loader-spinner"></div>
            <div class="loader-text" id="loaderText">Analyzing Content...</div>
            <div class="loader-subtext" id="loaderSubtext">Our AI is scanning for phishing patterns.</div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        lucide.createIcons();

        $('form').on('submit', function(e) {
            const $form = $(this);
            if ($form.data('submitted')) return;
            
            e.preventDefault();
            showLoader('Analyzing Content...', 'Our AI is scanning for phishing patterns.');
            
            $form.data('submitted', true);
            setTimeout(function() {
                $form.get(0).submit();
            }, 150);
        });

        // Global link handler for internal navigation
        $(document).on('click', 'a', function(e) {
            const $this = $(this);
            const href = $this.attr('href');
            const target = $this.attr('target');
            
            if (href && !href.startsWith('http') && !href.startsWith('#') && target !== '_blank') {
                e.preventDefault();
                showLoader('Navigating...', 'Transitioning to security assessment...');
                setTimeout(function() {
                    window.location.href = href;
                }, 100);
            }
        });

        // Hide loader when navigating back
        window.addEventListener('pageshow', function(event) {
            if (event.persisted) {
                hideLoader();
            }
        });

        function showLoader(text, subtext) {
            if (text) $('#loaderText').text(text);
            if (subtext) $('#loaderSubtext').text(subtext);
            $('#globalLoader').addClass('active');
        }

        function hideLoader() {
            $('#globalLoader').removeClass('active');
        }
    </script>
</body>
</html>
